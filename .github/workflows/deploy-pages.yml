# Deploy florarie și gym ca pagini separate pe GitHub Pages
# După push pe main: https://<user>.github.io/<repo>/  → index cu linkuri
#                    https://<user>.github.io/<repo>/florarie/  → site florărie
#                    https://<user>.github.io/<repo>/gym/       → site gym

name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Pregătește artifact pentru Pages
        run: |
          mkdir -p _site
          cp index.html _site/
          cp -r florarie _site/
          cp -r gym _site/
          touch _site/.nojekyll

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - name: Deploy to GitHub Pages
        id: deploy
        uses: actions/deploy-pages@v4

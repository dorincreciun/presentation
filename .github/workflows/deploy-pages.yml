# Deploy florarie și gym ca pagini separate pe GitHub Pages
# Publică pe branch-ul gh-pages. În Settings → Pages alege Source: Deploy from a branch, branch: gh-pages.

name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Pregătește site
        run: |
          mkdir -p _site
          cp index.html _site/
          cp -r florarie _site/
          cp -r gym _site/
          touch _site/.nojekyll

      - name: Deploy pe gh-pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: _site
          force_orphan: true

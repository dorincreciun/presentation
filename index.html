<!DOCTYPE html>
<html lang="ro">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Prezentări — Florărie & Gym</title>
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: system-ui, -apple-system, sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #1a1a1a;
      color: #e5e5e5;
    }
    .wrap {
      text-align: center;
      padding: 2rem;
    }
    h1 {
      font-size: 1.5rem;
      font-weight: 600;
      margin-bottom: 2rem;
      color: #a3a3a3;
    }
    .links {
      display: flex;
      gap: 1.5rem;
      flex-wrap: wrap;
      justify-content: center;
    }
    a {
      display: inline-block;
      padding: 1rem 1.5rem;
      border-radius: 8px;
      text-decoration: none;
      font-weight: 600;
      transition: transform 0.2s, box-shadow 0.2s;
    }
    a:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 24px rgba(0,0,0,0.3);
    }
    .link-florarie {
      background: #5c6b52;
      color: #faf9f6;
    }
    .link-gym {
      background: #a3e635;
      color: #0a0a0a;
    }
  </style>
</head>
<body>
  <div class="wrap">
    <h1>Prezentări</h1>
    <div class="links">
      <a href="florarie/" class="link-florarie">Florărie — Flori de Colectie</a>
      <a href="gym/" class="link-gym">Gym — PowerZone</a>
    </div>
  </div>
</body>
</html>
